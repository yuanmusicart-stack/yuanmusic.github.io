<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs | Yuan Music</title>
    <style>
        :root {
            --morandi-bg: #EAE7E1;    
            --morandi-green: #A3B18A; 
            --morandi-dark: #3A4032;  
            --morandi-gold: #B8977E;  
            --white: #F8F9F7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--white);
            font-family: 'Abadi MT Condensed Extra Bold', 'Abadi', sans-serif;
            color: var(--morandi-dark);
            line-height: 1.6;
        }

        header {
            padding: 80px 10% 40px;
            text-align: center;
            background: var(--morandi-bg);
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--morandi-dark);
            margin-bottom: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 5%;
        }

        /* 从上到下、一个一个摆放的列表布局 */
        .program-list {
            display: flex;
            flex-direction: column;
            gap: 50px;
            margin-bottom: 40px;
        }

        .program-card {
            background: white;
            padding: 40px;
            border-radius: 4px;
            border: 1px solid #eee;
            display: flex;
            flex-direction: row;
            gap: 40px;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* 响应式：在手机等小屏幕上自动切回上下堆叠 */
        @media (max-width: 768px) {
            .program-card {
                flex-direction: column;
                padding: 30px 20px;
                gap: 20px;
            }
            .program-text, .gallery-slider {
                width: 100% !important;
            }
        }

        .program-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        /* 课程文字区域 */
        .program-text {
            width: 50%;
            text-align: left;
        }

        .program-text h3 {
            font-size: 1.8rem;
            color: var(--morandi-green);
            margin-top: 0;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .program-text p {
            font-size: 1.05rem;
            color: #666;
            margin: 0;
        }

        /* 轮播幻灯片媒体区域 */
        .gallery-slider {
            position: relative;
            width: 50%;
            aspect-ratio: 4 / 3;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .slide-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            z-index: 1;
        }

        .slide-item.active {
            opacity: 1;
            z-index: 2;
        }

        .slide-item img, .slide-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 轮播切换箭头 */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.75);
            color: var(--morandi-dark);
            border: none;
            width: 36px;
