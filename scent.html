<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Fragrance | Yuan Music</title>
    <style>
        :root {
            --morandi-bg: #EAE7E1;    
            --morandi-green: #A3B18A; 
            --morandi-dark: #3A4032;  
            --morandi-gold: #B8977E;  
            --white: #F8F9F7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--white);
            font-family: 'Abadi MT Condensed Extra Bold', 'Abadi', sans-serif;
            color: var(--morandi-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .quote-container {
            max-width: 800px;
            padding: 40px;
            border-left: 5px solid var(--morandi-green);
            background: rgba(234, 231, 225, 0.5);
        }

        .quote-en {
            font-size: 2.2rem;
            font-style: italic;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        .quote-cn {
            font-size: 1.4rem;
            color: var(--morandi-dark);
            opacity: 0.9;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .author {
            font-weight: bold;
            color: var(--morandi-gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .back-home {
            margin-top: 50px;
            text-decoration: none;
            color: var(--morandi-green);
            font-size: 1.1rem;
            border: 1px solid var(--morandi-green);
            padding: 10px 25px;
            transition: all 0.3s;
        }

        .back-home:hover {
            background: var(--morandi-green);
            color: white;
        }

        /* 预留产品区域的占位符 */
        .coming-soon {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #999;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="quote-container">
        <p class="quote-en">"The harmony of scent and sound transcends the reach of language."</p>
        <p class="quote-cn">“香氛与音乐的共鸣，远不止于辞藻之间。”</p>
        <p class="author">— Francis Kurkdjian</p>
    </div>

    <p class="coming-soon">EXQUISITE COLLECTION COMING SOON</p>

    <a href="index.html" class="back-home">Back to Home</a>

</body>
</html>
